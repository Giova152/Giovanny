<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soumettre un Projet — Giovanny Gandonou</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #e6ece8, #ffffff);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(53,102,70,0.12);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .header-nav {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }
        
        .back-btn {
            color: #356646;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            background: #f0f4f1;
            padding: 8px 16px;
            border-radius: 20px;
            transition: .3s;
        }
        
        .back-btn:hover {
            background: #356646;
            color: #fff;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        
        .header p {
            color: #555;
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .project-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d9d4;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: #fcfdfc;
            transition: all .3s;
            color: #333;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #356646;
            box-shadow: 0 0 0 4px rgba(53,102,70,.1);
            background: #fff;
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
        
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
        }
        
        .file-input {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 14px;
        }
        
        ::file-selector-button {
            background: #e6ece8;
            border: 1px solid #d1d9d4;
            border-radius: 8px;
            padding: 8px 14px;
            margin-right: 12px;
            color: #356646;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: .3s;
        }
        
        ::file-selector-button:hover {
            background: #d1d9d4;
            color: #1a1a1a;
        }
        
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-top: 10px;
            padding: 15px;
            background: #f9fbf9;
            border-radius: 12px;
            border: 1px solid #e0e6e2;
        }
        
        .checkbox-group input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            accent-color: #356646;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .checkbox-group label {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
            cursor: pointer;
        }
        
        .validate-section {
            margin-top: 20px;
            padding-top: 30px;
            border-top: 1px solid #e0e6e2;
            text-align: center;
        }
        
        .validate-btn {
            background: #356646;
            color: #fff;
            border: none;
            padding: 16px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all .3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(53,102,70,.25);
        }
        
        .validate-btn:hover {
            background: #295037;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(53,102,70,.35);
        }

        /* =========================================
           STYLES DE LA FENÊTRE MODALE (POPUP)
           ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            transform: translateY(30px);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal-btn:hover {
            color: #1a1a1a;
        }

        .payment-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .payment-header h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 5px;
        }

        .payment-header p {
            font-size: 14px;
            color: #666;
        }

        .client-recap {
            background: #f0f4f1;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
            text-align: center;
        }
        
        .client-recap strong {
            color: #1a1a1a;
        }

        #chariow-widget-wrapper {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e0e6e2;
            min-height: 350px;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
            .modal-content {
                width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-nav">
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Retour</a>
            </div>
            <h1>Parlez-moi de votre projet</h1>
            <p>Remplissez ce formulaire pour valider votre demande.</p>
        </div>
        
        <form class="project-form" id="dossierForm" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="prenom">Prénom *</label>
                    <input type="text" id="prenom" name="prenom" class="form-control" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label for="nom">Nom *</label>
                    <input type="text" id="nom" name="nom" class="form-control" placeholder="Doe" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Adresse email *</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="john@entreprise.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="+229 97 00 00 00">
                </div>
            </div>
            
            <div class="form-group">
                <label for="website">Site web actuel ou nom de l'entreprise</label>
                <input type="text" id="website" name="website" class="form-control" placeholder="ex: https://mon-site.com">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="type_projet">Type de projet *</label>
                    <select id="type_projet" name="type_projet" class="form-control" required>
                        <option value="" disabled selected>Sélectionnez…</option>
                        <option value="Site Vitrine">Site Vitrine</option>
                        <option value="Boutique E-Commerce">Boutique E-Commerce</option>
                        <option value="Application Web / Sur-mesure">Application Web / Sur-mesure</option>
                        <option value="Refonte de site existant">Refonte de site existant</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="budget">Budget estimé *</label>
                    <select id="budget" name="budget" class="form-control" required>
                        <option value="" disabled selected>Sélectionnez…</option>
                        <option value="Moins de 1 000 €">Moins de 1 000 €</option>
                        <option value="1 000 € – 3 000 €">1 000 € – 3 000 €</option>
                        <option value="Plus de 3 000 €">Plus de 3 000 €</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">Description détaillée *</label>
                <textarea id="description" name="description" class="form-control" required></textarea>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="rgpd" name="rgpd" required>
                <label for="rgpd">J'accepte que les informations soient utilisées pour ma demande.</label>
            </div>
            
            <div class="validate-section">
                <button type="submit" class="validate-btn" id="validateBtn">
                    <i class="fas fa-lock"></i>
                    Valider et procéder au paiement (50€)
                </button>
            </div>
        </form>
    </div>
    
    <div id="paymentModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn" id="closeModal">&times;</button>
            
            <div class="payment-header">
                <h2>Paiement Sécurisé</h2>
                <p>Règlement des frais de dossier</p>
            </div>

            <div class="client-recap" id="clientRecap">
                </div>
            
            <div id="chariow-widget-wrapper">
                <div id="chariow-widget" 
                    data-product-id="prd_y24kpy"
                    data-store-domain="enfancience-academy.mychariow.shop"
                    data-style="frame"
                    data-border-style="rounded"
                    data-cta-width="xs"
                    data-cta-animation="none"
                    data-locale="en"
                    data-primary-color="#008F51"
                    data-background-color="#FFFFFF">
                </div>
            </div>
        </div>
    </div>
    
    <script>
    (function() {
      var script = document.createElement('script');
      script.src = 'https://js.chariowcdn.com/v1/widget.min.js';
      script.async = true;
      document.head.appendChild(script);
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://js.chariowcdn.com/v1/widget.min.css';
      document.head.appendChild(link);
    })();
    </script>
    
    <script>
        let formData = null;
        const modal = document.getElementById('paymentModal');
        const closeModalBtn = document.getElementById('closeModal');
        
        // Fermer la modale
        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Gestion de la soumission du formulaire
        document.getElementById('dossierForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const form = e.target;
            if (!form.checkValidity()) {
                // Déclenche l'affichage natif des erreurs HTML5
                form.reportValidity();
                return;
            }
            
            // Collecte des données
            formData = {
                prenom: document.getElementById('prenom').value,
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value,
                type_projet: document.getElementById('type_projet').value
            };
            
            // Afficher le petit récapitulatif dans la modale
            document.getElementById('clientRecap').innerHTML = `
                Dossier de : <strong>${formData.prenom} ${formData.nom}</strong><br>
                Projet : <strong>${formData.type_projet}</strong>
            `;
            
            // Attacher les données au widget pour le suivi marchand
            const widget = document.getElementById('chariow-widget');
            if (widget) {
                widget.setAttribute('data-metadata', JSON.stringify(formData));
            }
            
            // AFFICHER LA MODALE (le popup)
            modal.classList.add('active');
        });
        
        // Écouteurs de succès/échec du paiement
        window.addEventListener('chariow:payment:success', (event) => {
            modal.classList.remove('active');
            alert('🎉 Paiement confirmé ! Votre dossier est en cours de traitement.');
            // Optionnel : rediriger vers une page de remerciement
            // window.location.href = "merci.html";
        });
        
        window.addEventListener('chariow:payment:failed', (event) => {
            alert('❌ Le paiement a échoué. Veuillez réessayer.');
        });
    </script>
</body>
</html>
